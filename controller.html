<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Controller - Phone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF6B9D 0%, #FEC860 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 15px;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .connection-status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .connected { background: #d4edda; color: #155724; }
        .disconnected { background: #f8d7da; color: #721c24; }
        .connecting { background: #fff3cd; color: #856404; }

        .room-code {
            font-size: 18px;
            font-weight: bold;
            background: #2c3e50;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            letter-spacing: 2px;
        }

        .turn-indicator {
            font-size: 14px;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 5px;
            background: #e9ecef;
        }

        .turn-white { color: #2c3e50; }
        .turn-black { color: #34495e; }
        .your-turn { background: #4caf50; color: white; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .board-container {
            text-align: center;
            margin: 15px 0;
            overflow-x: auto;
        }

        .chess-board {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .board-row {
            display: flex;
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            touch-action: manipulation;
        }

        @media (max-width: 600px) {
            .square {
                width: 50px;
                height: 50px;
                font-size: 34px;
            }
        }

        @media (max-width: 480px) {
            .square {
                width: 45px;
                height: 45px;
                font-size: 30px;
            }
        }

        @media (max-width: 380px) {
            .square {
                width: 40px;
                height: 40px;
                font-size: 26px;
            }
        }

        .square.light {
            background-color: #FFFACD;
        }

        .square.dark {
            background-color: #FFB6C1;
        }

        .square.selected {
            background-color: #32CD32 !important;
            box-shadow: 0 0 20px #FFD700, inset 0 0 0 3px gold;
            transform: scale(0.98);
        }

        .square.valid-move::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: rgba(255, 215, 0, 0.8);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.9);
        }

        .square.check {
            background-color: #FF1493 !important;
            animation: shake 0.4s ease-in-out infinite;
            box-shadow: 0 0 20px #FF1493;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.95);
        }

        .reset-btn {
            background: #e74c3c;
            color: white;
        }

        .exit-btn {
            background: #95a5a6;
            color: white;
        }

        .message-area {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
        }

        .move-history {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 15px;
            font-size: 11px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
        }

        .move-history h4 {
            margin-bottom: 5px;
            font-size: 12px;
        }

        .move-list {
            display: grid;
            grid-template-columns: auto auto;
            gap: 3px;
        }

        .move-item {
            padding: 3px;
            background: white;
            border-radius: 3px;
            font-size: 10px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Chess Controller 🎮</h1>
        
        <div class="status-bar">
            <div class="connection-status" id="connection-status">Connecting...</div>
            <div class="room-code" id="room-code">Loading...</div>
            <div class="turn-indicator" id="turn-indicator">Waiting...</div>
        </div>
        
        <div class="board-container">
            <div class="chess-board" id="chess-board"></div>
        </div>
        
        <div class="controls">
            <button id="reset-game" class="reset-btn">🔄 Reset</button>
            <button id="exit-game" class="exit-btn">🏠 Exit</button>
        </div>
        
        <div class="message-area" id="message-area">
            Tap a piece, then tap a square to move
        </div>
        
        <div class="move-history">
            <h4>Move History:</h4>
            <div class="move-list" id="move-list"></div>
        </div>
    </div>
    
    <script src="chess-engine.js"></script>
    <script src="webrtc-connection.js"></script>
    <script src="gamification.js"></script>
    
    <script>
        let engine = new ChessEngine();
        let webrtc = null;
        let roomCode = null;
        let selectedSquare = null;
        let myColor = null;
        let controllerId = Math.random().toString(36).substring(2, 10);
        let isMyTurn = false;
        
        // Piece Unicode mapping - Standard Chess Symbols
        const pieceMap = {
            'wr': '♖', 'wn': '♘', 'wb': '♗', 'wq': '♕', 'wk': '♔', 'wp': '♙',
            'br': '♜', 'bn': '♞', 'bb': '♝', 'bq': '♛', 'bk': '♚', 'bp': '♟'
        };
        
        // Initialize
        function init() {
            // Get room code from URL
            const urlParams = new URLSearchParams(window.location.search);
            roomCode = urlParams.get('room');
            
            if (!roomCode) {
                showMessage('No room code provided!', 'error');
                document.getElementById('room-code').textContent = 'Invalid';
                return;
            }
            
            document.getElementById('room-code').textContent = roomCode;
            
            // Initialize WebRTC as client
            initWebRTC();
            renderBoard();
        }
        
        // Initialize WebRTC connection
        async function initWebRTC() {
            webrtc = new WebRTCConnection(roomCode, false);
            webrtc.onMessage(handleMessage);
            await webrtc.initialize();
            
            // Register with main display
            webrtc.sendMessage('REGISTER', { controllerId });
            
            // Update connection status
            setInterval(() => {
                const statusEl = document.getElementById('connection-status');
                if (webrtc.connectionStatus === 'connected') {
                    statusEl.textContent = '✅ Connected';
                    statusEl.className = 'connection-status connected';
                } else if (webrtc.connectionStatus === 'connecting') {
                    statusEl.textContent = '🔄 Connecting...';
                    statusEl.className = 'connection-status connecting';
                } else {
                    statusEl.textContent = '🔌 Disconnected';
                    statusEl.className = 'connection-status disconnected';
                }
            }, 1000);
        }
        
        // Handle incoming messages
        function handleMessage(message) {
            console.log('Received:', message);
            
            switch(message.type) {
                case 'SYNC':
                    handleSync(message.data);
                    break;
                case 'REGISTERED':
                    handleRegistration(message.data);
                    break;
                case 'TURN':
                    handleTurnNotification(message.data);
                    break;
                case 'MOVE':
                    // Move from opponent in two-player mode
                    if (message.data.controllerId !== controllerId) {
                        handleOpponentMove(message.data);
                    }
                    break;
            }
        }
        
        // Handle board sync
        function handleSync(data) {
            engine.loadFromFEN(data.fen);
            renderBoard();
            updateMoveHistory();
            
            // Update turn display
            const isPlayersTurn = (myColor === data.currentTurn);
            isMyTurn = isPlayersTurn;
            updateTurnDisplay(data.currentTurn, isPlayersTurn);
        }
        
        // Handle registration response
        function handleRegistration(data) {
            myColor = data.color;
            showMessage(`You are playing as ${myColor.toUpperCase()}!`, 'success');
            
            // Update UI to show player color
            const turnIndicator = document.getElementById('turn-indicator');
            turnIndicator.innerHTML = `🎨 ${myColor.toUpperCase()}`;
        }
        
        // Handle turn notification
        function handleTurnNotification(data) {
            isMyTurn = data.yourTurn;
            updateTurnDisplay(data.currentPlayer, data.yourTurn);
            
            if (data.yourTurn) {
                showMessage('Your turn! Make a move! 🎮', 'success');
                // Haptic feedback if available
                if (navigator.vibrate) navigator.vibrate(100);
            } else {
                showMessage('Waiting for opponent... ⏳', 'info');
            }
        }
        
        // Handle opponent's move
        function handleOpponentMove(data) {
            engine.makeMove(data.from.row, data.from.col, data.to.row, data.to.col);
            renderBoard();
            updateMoveHistory();
            showMessage('Opponent moved!', 'info');
        }
        
        // Update turn display
        function updateTurnDisplay(currentTurn, isPlayersTurn) {
            const turnIndicator = document.getElementById('turn-indicator');
            const turnText = currentTurn === 'white' ? '⚪ White' : '⚫ Black';
            
            if (isPlayersTurn) {
                turnIndicator.innerHTML = `🎮 YOUR TURN - ${turnText}`;
                turnIndicator.className = 'turn-indicator your-turn';
            } else {
                turnIndicator.innerHTML = `⏳ ${turnText}'s Turn`;
                turnIndicator.className = 'turn-indicator';
            }
        }
        
        // Render chess board
        function renderBoard() {
            const boardEl = document.getElementById('chess-board');
            boardEl.innerHTML = '';
            
            const kingPos = engine.findKing(engine.currentTurn);
            const isInCheck = kingPos && engine.isInCheck(engine.currentTurn);
            
            for (let i = 0; i < 8; i++) {
                const row = document.createElement('div');
                row.className = 'board-row';
                
                for (let j = 0; j < 8; j++) {
                    const piece = engine.getPiece(i, j);
                    const square = document.createElement('div');
                    square.className = `square ${(i + j) % 2 === 0 ? 'light' : 'dark'}`;
                    
                    if (selectedSquare && selectedSquare.row === i && selectedSquare.col === j) {
                        square.classList.add('selected');
                    }
                    
                    if (isInCheck && kingPos && kingPos.row === i && kingPos.col === j) {
                        square.classList.add('check');
                    }
                    
                    if (piece) {
                        square.textContent = pieceMap[piece] || '?';
                    }
                    
                    square.onclick = (function(row, col) {
                        return function() { handleSquareClick(row, col); };
                    })(i, j);
                    
                    row.appendChild(square);
                }
                boardEl.appendChild(row);
            }
            
            // Highlight valid moves for selected piece
            if (selectedSquare) {
                const validMoves = engine.getLegalMovesForPiece(selectedSquare.row, selectedSquare.col);
                validMoves.forEach(move => {
                    const row = document.querySelector(`.board-row:nth-child(${move.row + 1})`);
                    if (row) {
                        const square = row.children[move.col];
                        if (square) square.classList.add('valid-move');
                    }
                });
            }
        }
        
        // Handle square click
        function handleSquareClick(row, col) {
            // Only allow moves if it's player's turn and game not over
            if (!isMyTurn || engine.gameOver) {
                if (engine.gameOver) {
                    showMessage('Game is over! Reset to play again.', 'error');
                } else if (!isMyTurn) {
                    showMessage('Not your turn!', 'error');
                    if (navigator.vibrate) navigator.vibrate(200);
                }
                return;
            }
            
            if (!selectedSquare) {
                // Select piece
                const piece = engine.getPiece(row, col);
                if (piece && piece[0] === (myColor === 'white' ? 'w' : 'b')) {
                    selectedSquare = { row, col };
                    renderBoard();
                    
                    // Haptic feedback
                    if (navigator.vibrate) navigator.vibrate(50);
                    showMessage(`Selected ${getPieceName(piece)}`, 'info');
                } else {
                    showMessage('Not your piece!', 'error');
                    if (navigator.vibrate) navigator.vibrate(100);
                }
            } else {
                // Attempt to move
                if (engine.isValidMove(selectedSquare.row, selectedSquare.col, row, col)) {
                    // Send move to main display
                    const moveData = {
                        from: selectedSquare,
                        to: { row, col },
                        controllerId
                    };
                    
                    webrtc.sendMessage('MOVE', moveData);
                    
                    // Optimistically update local board
                    engine.makeMove(selectedSquare.row, selectedSquare.col, row, col);
                    renderBoard();
                    updateMoveHistory();
                    
                    // Disable moves until confirmation
                    isMyTurn = false;
                    updateTurnDisplay(engine.currentTurn, false);
                    
                    // Haptic feedback
                    if (navigator.vibrate) navigator.vibrate(50);
                    showMessage('Move sent!', 'success');
                } else {
                    showMessage('Invalid move!', 'error');
                    if (navigator.vibrate) navigator.vibrate(200);
                }
                
                selectedSquare = null;
                renderBoard();
            }
        }
        
        // Get piece name for messages
        function getPieceName(piece) {
            const names = {
                'p': 'Pawn', 'n': 'Knight', 'b': 'Bishop',
                'r': 'Rook', 'q': 'Queen', 'k': 'King'
            };
            return names[piece[1]] || 'Piece';
        }
        
        // Update move history display
        function updateMoveHistory() {
            const moveList = document.getElementById('move-list');
            moveList.innerHTML = '';
            
            engine.moveHistory.forEach((move, index) => {
                const moveNum = Math.floor(index / 2) + 1;
                const moveItem = document.createElement('div');
                moveItem.className = 'move-item';
                
                if (index % 2 === 0) {
                    moveItem.innerHTML = `<strong>${moveNum}.</strong> ${move.notation}`;
                } else {
                    moveItem.innerHTML = `${move.notation}`;
                }
                
                moveList.appendChild(moveItem);
            });
        }
        
        // Show message
        function showMessage(msg, type = 'info') {
            const messageArea = document.getElementById('message-area');
            messageArea.textContent = msg;
            messageArea.style.background = type === 'error' ? '#f8d7da' : (type === 'success' ? '#d4edda' : '#e9ecef');
            messageArea.style.color = type === 'error' ? '#721c24' : (type === 'success' ? '#155724' : '#666');
            
            // Create toast
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
            
            // Auto-clear message after 3 seconds
            setTimeout(() => {
                if (messageArea.textContent === msg) {
                    messageArea.textContent = 'Tap a piece, then tap a square to move';
                    messageArea.style.background = '#e9ecef';
                    messageArea.style.color = '#666';
                }
            }, 3000);
        }
        
        // Reset game
        function resetGame() {
            engine.resetGame();
            selectedSquare = null;
            renderBoard();
            updateMoveHistory();
            showMessage('Game reset!', 'success');
            
            // Notify main display
            webrtc.sendMessage('SYNC', { fen: engine.getFEN(), currentTurn: engine.currentTurn });
        }
        
        // Exit/close controller
        function exitGame() {
            if (confirm('Exit controller?')) {
                if (webrtc) webrtc.close();
                window.close();
                // Fallback
                window.location.href = 'about:blank';
            }
        }
        
        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('reset-game').onclick = resetGame;
            document.getElementById('exit-game').onclick = exitGame;
        }
        
        // Start the app
        setupEventListeners();
        init();
    </script>
</body>
</html>
